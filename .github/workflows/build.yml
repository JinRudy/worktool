name: Build WorkTool APK & Deploy Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # 构建 APK + 部署 Pages（tag push 时执行）
  build-and-deploy:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION_NAME=${TAG_NAME#v}
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          MAJOR=$(echo "$VERSION_NAME" | cut -d. -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d. -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d. -f3)
          VERSION_CODE=$((30000 + MAJOR * 100 + MINOR * 10 + PATCH))
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -PversionName=${{ steps.version.outputs.version_name }} -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Create GitHub Release and Upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag_name }} \
            app/build/outputs/apk/debug/sulingai-wza-${{ steps.version.outputs.version_name }}.apk \
            --title "素灵智能 ${{ steps.version.outputs.version_name }}" \
            --notes "## 版本 ${{ steps.version.outputs.version_name }}\n- Commit: ${{ github.sha }}"

      - name: Prepare Pages
        run: |
          mkdir -p pages
          cp app/build/outputs/apk/debug/sulingai-wza-${{ steps.version.outputs.version_name }}.apk \
             pages/sulingai-wza-${{ steps.version.outputs.version_name }}.apk
          cp app/build/outputs/apk/debug/sulingai-wza-${{ steps.version.outputs.version_name }}.apk \
             pages/latest.apk
          cp index.html pages/index.html
          printf '{"version":"${{ steps.version.outputs.version_name }}","version_code":${{ steps.version.outputs.version_code }},"download_url":"https://sulingai-wza.minifog.org.cn/sulingai-wza-${{ steps.version.outputs.version_name }}.apk","release_notes":"版本 ${{ steps.version.outputs.version_name }} 更新"}\n' > pages/version.json
          # 生成二维码
          pip install --quiet qrcode[pil]
          python3 -c "import qrcode; qrcode.make('https://sulingai-wza.minifog.org.cn/sulingai-wza-${{ steps.version.outputs.version_name }}.apk', border=2).save('pages/latest-qr.png')"
          ls -la pages/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy Pages
        uses: actions/deploy-pages@v4

  # 仅重新部署发布页（手动触发，从 GitHub Release 拉取最新 APK）
  redeploy-pages:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Latest APK from Release
        run: |
          mkdir -p pages
          LATEST_RELEASE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest)
          APK_NAME=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .name' | head -1)
          APK_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -1)
          if [ -n "$APK_NAME" ] && [ -n "$APK_URL" ]; then
            curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$APK_URL" -o "pages/$APK_NAME"
            cp "pages/$APK_NAME" "pages/latest.apk"
            echo "Fetched: $APK_NAME"
          else
            echo "WARNING: No APK found in latest release"
          fi

      - name: Prepare Pages
        run: |
          mkdir -p pages
          cp index.html pages/index.html
          LATEST_RELEASE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest)
          VERSION=$(echo "$LATEST_RELEASE" | jq -r '.tag_name // "unknown"')
          RELEASE_NOTES=$(echo "$LATEST_RELEASE" | jq -r '.body // ""')
          if [ "$VERSION" != "null" ] && [ "$VERSION" != "unknown" ] && [ -n "$VERSION" ]; then
            VERSION_NO_V="${VERSION#v}"
            MAJOR=$(echo "$VERSION_NO_V" | cut -d. -f1)
            MINOR=$(echo "$VERSION_NO_V" | cut -d. -f2)
            PATCH=$(echo "$VERSION_NO_V" | cut -d. -f3)
            VERSION_CODE=$((30000 + MAJOR * 100 + MINOR * 10 + PATCH))
            printf '{"version":"%s","version_code":%d,"download_url":"https://sulingai-wza.minifog.org.cn/latest.apk","release_notes":"%s"}\n' \
              "$VERSION_NO_V" "$VERSION_CODE" "$(echo "$RELEASE_NOTES" | head -1)" > pages/version.json
            # 生成二维码
            pip install --quiet qrcode[pil]
            python3 -c "import qrcode; qrcode.make('https://sulingai-wza.minifog.org.cn/latest.apk', border=2).save('pages/latest-qr.png')"
          fi
          ls -la pages/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
