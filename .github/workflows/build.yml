name: Build WorkTool APK & Deploy Pages

on:
  push:
    branches: ["master"]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # 构建 APK（仅 tag push 或手动触发时执行）
  build:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Extract Version
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION_NAME=${TAG_NAME#v}
          BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG_NAME (version: $VERSION_NAME, build: $BUILD_TIME)"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          release_name: 素灵智能 ${{ steps.version.outputs.version_name }}
          body: |
            ## 更新内容
            - 版本: ${{ steps.version.outputs.version_name }}
            - 构建时间: ${{ steps.version.outputs.build_time }}
            - Commit: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/debug/sulingai-wza-${{ steps.version.outputs.version_name }}.apk
          asset_name: sulingai-wza-${{ steps.version.outputs.version_name }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: worktool-debug-apk
          path: app/build/outputs/apk/debug/sulingai-wza-*.apk
          retention-days: 30

      - name: Prepare Pages
        run: |
          mkdir -p pages
          cp app/build/outputs/apk/debug/sulingai-wza-${{ steps.version.outputs.version_name }}.apk \
             pages/sulingai-wza-${{ steps.version.outputs.version_name }}.apk
          cp app/build/outputs/apk/debug/sulingai-wza-${{ steps.version.outputs.version_name }}.apk \
             pages/latest.apk
          cp index.html pages/index.html
          cat > pages/version.json << EOF
          {
            "version": "${{ steps.version.outputs.version_name }}",
            "version_code": 30000,
            "download_url": "https://sulingai-wza.minifog.org.cn/sulingai-wza-${{ steps.version.outputs.version_name }}.apk",
            "release_notes": "版本 ${{ steps.version.outputs.version_name }} 更新"
          }
          EOF
          echo "Pages files:"
          ls -la pages/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  # 仅部署发布页（push to master 时执行，从 GitHub Release 拉取最新 APK）
  deploy-pages-only:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Latest APK from Release
        run: |
          mkdir -p pages
          # 从 GitHub Release 拉取最新 APK
          LATEST_RELEASE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest)
          APK_NAME=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .name' | head -1)
          APK_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -1)
          if [ -n "$APK_NAME" ] && [ -n "$APK_URL" ]; then
            curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$APK_URL" -o "pages/$APK_NAME"
            echo "Fetched: $APK_NAME from Release"
          else
            echo "WARNING: No APK found in latest release"
            # 如果没有 Release，用 placeholder 占位
            echo "placeholder" > "pages/latest.apk"
          fi

      - name: Prepare Pages
        run: |
          cp index.html pages/index.html
          # 生成 version.json
          LATEST_RELEASE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest)
          VERSION=$(echo "$LATEST_RELEASE" | jq -r '.tag_name // "unknown"')
          if [ "$VERSION" != "null" ] && [ "$VERSION" != "" ]; then
            RELEASE_NOTES=$(echo "$LATEST_RELEASE" | jq -r '.body // ""')
            cat > pages/version.json << EOF
            {
              "version": "${VERSION#v}",
              "download_url": "https://sulingai-wza.minifog.org.cn/latest.apk",
              "release_notes": "${RELEASE_NOTES}"
            }
            EOF
          fi
          echo "Pages files:"
          ls -la pages/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  # 部署 GitHub Pages（两个 job 完成后执行）
  deploy:
    needs: [build, deploy-pages-only]
    if: always() && (needs.build.result == 'success' || needs.deploy-pages-only.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4