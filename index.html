<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素灵智能 WorkTool - 微信自动化客户端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-soft: #eef2ff;
            --accent: #8b5cf6;
            --accent-soft: #f5f3ff;
            --bg-card: #ffffff;
            --text: #1e1b4b;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-hover: 0 10px 40px -10px rgba(99, 102, 241, 0.25);
            --radius: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fdf4ff 0%, #f3e8ff 30%, #eef2ff 60%, #faf5ff 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            padding: 40px 16px;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 30px 20px 40px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-dark);
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .hero h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 14px;
            letter-spacing: -0.5px;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 560px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* Features */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin: 24px 0 36px;
        }

        .feature {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px 18px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
        }

        .feature:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .feature .icon {
            font-size: 1.8rem;
            margin-bottom: 10px;
            display: block;
        }

        .feature h3 {
            font-size: 0.92rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text);
        }

        .feature p {
            color: var(--text-secondary);
            font-size: 0.78rem;
            line-height: 1.5;
        }

        /* Downloads Section */
        .downloads {
            margin-top: 32px;
        }

        .downloads h2 {
            font-size: 1.4rem;
            margin-bottom: 18px;
            text-align: center;
            color: var(--text);
            font-weight: 700;
        }

        .downloads h2 span {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .latest-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .latest-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
        }

        .latest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--primary-soft) 0%, var(--accent-soft) 100%);
        }

        .latest-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary);
            color: #fff;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .latest-tag::before {
            content: "";
            width: 7px;
            height: 7px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.3);
        }

        .latest-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .latest-body {
            padding: 26px 22px;
        }

        .latest-grid {
            display: grid;
            grid-template-columns: 1fr 180px;
            gap: 28px;
            align-items: center;
        }

        .latest-info h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .latest-info .release-notes {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 22px;
            white-space: pre-line;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
            border: none;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
        }

        .download-btn:hover {
            opacity: 0.92;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }

        .download-btn .icon {
            font-size: 1.1rem;
        }

        .latest-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }

        .release-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .release-link:hover {
            text-decoration: underline;
        }

        .qr-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
        }

        .qr-wrap img {
            width: 150px;
            height: 150px;
            display: block;
            border-radius: 8px;
            image-rendering: pixelated;
        }

        .qr-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-align: center;
        }

        .qr-hint {
            font-size: 0.7rem;
            color: #9ca3af;
            text-align: center;
        }

        .history {
            margin-top: 28px;
            padding-top: 22px;
            border-top: 1px solid var(--border);
        }

        .history h3 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
            font-weight: 600;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .history-version {
            font-weight: 700;
            color: var(--text);
            font-size: 0.92rem;
        }

        .history-date {
            color: var(--text-secondary);
            font-size: 0.78rem;
        }

        .history-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            background: var(--primary-soft);
            transition: background 0.2s;
        }

        .history-link:hover {
            background: #e0e7ff;
        }

        .loading, .error {
            text-align: center;
            padding: 40px;
            border-radius: var(--radius);
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .loading {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .error {
            color: #ef4444;
        }

        .error a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .error a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 24px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .footer .brand {
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 640px) {
            .hero h1 { font-size: 2rem; }
            .hero p { font-size: 0.95rem; }
            .features { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .feature { padding: 18px 14px; }
            .latest-grid { grid-template-columns: 1fr; gap: 22px; }
            .qr-wrap { margin: 0 auto; max-width: 200px; }
            .latest-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .latest-body { padding: 20px 18px; }
            .download-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="hero-badge">🚀 已适配企业微信 5.0.9</div>
            <h1>素灵智能 WorkTool</h1>
            <p>微信自动化客户端，基于 Android 无障碍服务实现，无需 Root 权限，兼容主流安卓机型。支持收发消息、建群、拉人踢人等自动化操作。</p>
        </div>

        <div class="features">
            <div class="feature">
                <span class="icon">🤖</span>
                <h3>无人值守</h3>
                <p>24小时自动运行</p>
            </div>
            <div class="feature">
                <span class="icon">📱</span>
                <h3>兼容性强</h3>
                <p>无需 Root 权限</p>
            </div>
            <div class="feature">
                <span class="icon">🔒</span>
                <h3>安全合规</h3>
                <p>无 Hook 无侵入</p>
            </div>
            <div class="feature">
                <span class="icon">⚡</span>
                <h3>API 驱动</h3>
                <p>灵活集成</p>
            </div>
        </div>

        <div class="downloads">
            <h2>📥 <span>版本下载</span></h2>
            <div id="releases">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="footer">
            <p><span class="brand">素灵智能</span> · WorkTool 微信自动化客户端</p>
        </div>
    </div>

    <script>
        async function loadReleases() {
            const container = document.getElementById('releases');
            const domain = window.location.origin;
            try {
                const response = await fetch('https://api.github.com/repos/JinRudy/worktool/releases');
                if (!response.ok) throw new Error('Failed to fetch');
                const releases = await response.json();

                if (releases.length === 0) {
                    container.innerHTML = '<div class="error">暂无可用版本</div>';
                    return;
                }

                let html = '';
                const latest = releases[0];
                const latestDate = new Date(latest.published_at).toLocaleDateString('zh-CN', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit'
                });
                // 清理 release notes，只取非链接、非二维码的几行
                const latestBody = latest.body
                    ? latest.body
                        .split('\n')
                        .filter(line =>
                            line.trim() &&
                            !line.startsWith('**GitHub Release') &&
                            !line.startsWith('**GitHub Pages') &&
                            !line.match(/!\[QR\]/) &&
                            !line.match(/^https?:/)
                        )
                        .slice(0, 6)
                        .join('\n')
                        .replace(/^##\s*/, '')
                        .replace(/\n-\s*/g, '\n• ')
                    : '';
                const latestVersion = latest.tag_name.replace(/^v/, '');

                html += `
                    <div class="latest-card">
                        <div class="latest-header">
                            <span class="latest-tag">${latest.tag_name}</span>
                            <span class="latest-date">${latestDate}</span>
                        </div>
                        <div class="latest-body">
                            <div class="latest-grid">
                                <div class="latest-info">
                                    <h3>最新版本</h3>
                                    ${latestBody ? `<p class="release-notes">${latestBody}</p>` : ''}
                                    <a href="${domain}/sulingai-wza-${latestVersion}.apk" class="download-btn">
                                        <span class="icon">⬇</span>
                                        下载最新版 APK
                                    </a>
                                    <div class="latest-actions">
                                        <a href="${latest.html_url}" target="_blank" class="release-link">🔗 查看 GitHub Release 详情</a>
                                        <a href="${domain}/latest.apk" class="release-link">📦 备用直链：latest.apk</a>
                                    </div>
                                </div>
                                <div class="qr-wrap">
                                    <img src="${domain}/latest-qr.png" alt="扫码下载" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(domain + '/sulingai-wza-' + latestVersion + '.apk')}'">
                                    <span class="qr-label">手机扫码下载</span>
                                    <span class="qr-hint">微信 / 浏览器均可</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                if (releases.length > 1) {
                    html += '<div class="history"><h3>历史版本</h3>';
                    for (let i = 1; i < releases.length; i++) {
                        const release = releases[i];
                        const dateStr = new Date(release.published_at).toLocaleDateString('zh-CN', {
                            year: 'numeric', month: '2-digit', day: '2-digit',
                            hour: '2-digit', minute: '2-digit'
                        });
                        html += `
                            <div class="history-item">
                                <div class="history-meta">
                                    <span class="history-version">${release.tag_name}</span>
                                    <span class="history-date">${dateStr}</span>
                                </div>
                                <a href="${release.html_url}" target="_blank" class="history-link">GitHub 下载</a>
                            </div>
                        `;
                    }
                    html += '</div>';
                }

                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<div class="error">加载失败：${err.message}<br><br>
                    备用下载：<a href="${domain}/latest.apk">最新 APK</a></div>`;
            }
        }
        loadReleases();
    </script>
</body>
</html>
